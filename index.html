<!DOCTYPE html>
<html>
<head>
    <title>Web Attendance System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 15px 0;
        }
        a {
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Web Attendance System</h1>
    <ul>
        <li><a href="/train">Train Face (Live / Upload)</a></li>
        <li><a href="/attendance">Mark Attendance (Live)</a></li>
        <li><a href="/view">View Attendance</a></li>
    </ul>
</body>
</html>
